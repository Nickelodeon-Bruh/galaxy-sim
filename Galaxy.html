<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milky Way</title>
<link rel="icon" type="image/png" href="/favicon/favicon.svg" sizes="96x96" media="(prefers-color-scheme: dark)" />
<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" media="(prefers-color-scheme: light)" />
<style>
  :root{
    --bg:#05060a;
    --ink:#e8ecf5;
    --dim:#7a8296;
    --gold:#ffd9a0;
    --line:rgba(255,255,255,0.14);
    --mono: 'Space Mono', 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg); overflow:hidden;
    font-family:var(--mono);
  }
  #app{position:relative; width:100vw; height:100vh;}
  canvas{display:block; width:100%; height:100%; touch-action:none; cursor:grab;}
  canvas:active{cursor:grabbing;}

  .vignette{
    position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
  }

  .hud{ position:absolute; pointer-events:none; color:var(--ink); letter-spacing:0.08em; }
  .hud-bl{ left:22px; bottom:20px; }
  .hud-bl .title{ font-size:12px; text-transform:uppercase; color:var(--dim); letter-spacing:0.22em; margin-bottom:6px; }
  .hud-bl .name{ font-size:22px; color:var(--ink); font-weight:700; letter-spacing:0.04em; }
  .hud-bl .sub{ font-size:11px; color:var(--dim); margin-top:6px; max-width:280px; line-height:1.5; }
  .hud-br{ right:22px; bottom:20px; text-align:right; font-size:11px; color:var(--dim); line-height:1.9; }
  .hud-br span{ color:var(--gold); }
  .hud-tl{ left:22px; top:20px; font-size:11px; color:var(--dim); display:flex; align-items:center; gap:8px; }
  .hud-tl .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px 2px var(--gold); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  .hint{
    position:absolute; left:50%; bottom:20px; transform:translateX(-50%);
    font-size:10px; color:var(--dim); letter-spacing:0.14em; text-transform:uppercase;
    opacity:0; transition:opacity 1.4s ease; pointer-events:none; text-align:center;
  }
  .hint.show{opacity:0.75;}

  .frame{ position:absolute; inset:14px; pointer-events:none; border:1px solid var(--line); }
  .frame .tick{ position:absolute; width:14px; height:14px; border-color:var(--dim); opacity:0.55; }
  .tick.tl{top:-1px; left:-1px; border-top:1px solid; border-left:1px solid;}
  .tick.tr{top:-1px; right:-1px; border-top:1px solid; border-right:1px solid;}
  .tick.bl{bottom:-1px; left:-1px; border-bottom:1px solid; border-left:1px solid;}
  .tick.br{bottom:-1px; right:-1px; border-bottom:1px solid; border-right:1px solid;}

  .loading{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--dim); font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
    z-index:10; transition:opacity 0.6s ease;
  }

  @media (max-width: 640px){
    .hud-br{display:none;}
    .hud-bl .sub{max-width:200px;}
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="gl"></canvas>
  <div class="vignette"></div>
  <div class="frame">
    <div class="tick tl"></div><div class="tick tr"></div>
    <div class="tick bl"></div><div class="tick br"></div>
  </div>

  <div class="hint" id="hint">drag to orbit · scroll to zoom</div>
  <div class="loading" id="loading">Rendering galaxy…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";

  // ============================================================
  // TUNABLES
  // The visible spiral structure (arms, dust lanes, core glow) is
  // now a single painted texture generated once at load — not
  // thousands of overlapping sprites — so it's cheap regardless of
  // GPU. The point layers below are just a sparkle/parallax layer
  // on top of that painting. Lower these first if you ever need
  // more headroom on very low-end/integrated GPUs.
  // ============================================================
  var TOTAL_ARM_STARS = 165000;
  var BULGE_STARS      = 32000;
  var HALO_STARS       = 22000;
  var BG_STARS         = 70000;
  var BLOOM_DOWNSAMPLE = 2;
  var TEXTURE_SIZE     = 3072;

  var canvas = document.getElementById('gl');
  var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:false});
  var pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
  renderer.setPixelRatio(pixelRatio);
  renderer.setClearColor(0x05060a, 1);
  renderer.autoClear = true;

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(50, 1, 0.1, 4000);

  // ---------- Soft circular sprite texture (for point stars) ----------
  function makeSpriteTexture(){
    var size = 128;
    var c = document.createElement('canvas');
    c.width = c.height = size;
    var ctx = c.getContext('2d');
    var g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    g.addColorStop(0.0, 'rgba(255,255,255,1)');
    g.addColorStop(0.2, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.4, 'rgba(255,255,255,0.35)');
    g.addColorStop(1.0, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,size,size);
    var tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }
  var spriteTex = makeSpriteTexture();

  // ---------- Shared star/point shader ----------
  var vertexShader = [
    "attribute float aSize;",
    "attribute vec3 aColor;",
    "attribute float aPhase;",
    "attribute float aAlpha;",
    "uniform float uTime;",
    "uniform float uPixelRatio;",
    "uniform float uTwinkleAmp;",
    "varying vec3 vColor;",
    "varying float vAlpha;",
    "varying float vTwinkle;",
    "void main(){",
    "  vColor = aColor;",
    "  vAlpha = aAlpha;",
    "  float tw = 1.0 - uTwinkleAmp + uTwinkleAmp * (0.5 + 0.5*sin(uTime * 1.5 + aPhase));",
    "  vTwinkle = tw;",
    "  vec4 mv = modelViewMatrix * vec4(position, 1.0);",
    "  gl_PointSize = aSize * uPixelRatio * (300.0 / -mv.z) * tw;",
    "  gl_Position = projectionMatrix * mv;",
    "}"
  ].join("\n");

  var fragmentShader = [
    "uniform sampler2D uTex;",
    "varying vec3 vColor;",
    "varying float vAlpha;",
    "varying float vTwinkle;",
    "void main(){",
    "  vec4 tex = texture2D(uTex, gl_PointCoord);",
    "  gl_FragColor = vec4(vColor * vTwinkle, tex.a * vAlpha);",
    "}"
  ].join("\n");

  function makeMaterial(tex, blending, twinkleAmp){
    return new THREE.ShaderMaterial({
      uniforms: {
        uTime: {value:0}, uTex: {value: tex}, uPixelRatio: {value: pixelRatio},
        uTwinkleAmp: {value: twinkleAmp===undefined?0.25:twinkleAmp}
      },
      vertexShader: vertexShader, fragmentShader: fragmentShader,
      transparent: true, depthWrite: false,
      blending: blending===undefined ? THREE.AdditiveBlending : blending
    });
  }

  var _c1 = new THREE.Color(), _c2 = new THREE.Color();
  function mixColor(hexA, hexB, t){ _c1.set(hexA); _c2.set(hexB); _c1.lerp(_c2, t); return _c1.clone(); }

  function makeAttrGeometry(positions, colors, sizes, phases, alphas){
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
    geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
    return geo;
  }

  // ---------- Shared spiral geometry (used by BOTH the painted texture and the point stars, so they align) ----------
  var NUM_ARMS = 2;
  var GALAXY_RADIUS = 210;
  var ARM_TIGHTNESS = 0.62;
  var CORE_COLOR   = '#ffe9c2';
  var CORE_COLOR_HEX = 0xffe9c2;
  var ARM_HOT      = '#bcd8ff';
  var ARM_HOT_HEX  = 0xbcd8ff;
  var ARM_WARM_HEX = 0xd9c9ff;
  var LAVENDER_HEX = 0xc0a8ec;
  var DUST_RGB     = '46,30,20';
  var DUST_GRAY_HEX = 0x8f8074;
  var DUST_BROWN_HEX = 0x5a4030;
  var INTERARM_BLUE_HEX = 0x8fb8ec;
  var SUBSWIRL_HEX = 0x9fb0c9;
  var TEAL_HEX = 0x7fd6c9;
  var EMBER_HEX = 0xff9a5c;
  var HII_COLOR    = '#ff6fb8';
  var HII_COLOR_HEX = 0xff6fb8;

  function armAngle(r, offset){ return offset + r * ARM_TIGHTNESS * 0.045; }

  // ============================================================
  // Painted galaxy texture: gradients + brush-stamped arms +
  // multiply-blended dust lanes. One-time cost at load (a couple
  // thousand canvas draw calls, well under 100ms), then it's just
  // a single textured mesh at render time — effectively free.
  // ============================================================
  function buildGalaxyTexture(){
    var S = TEXTURE_SIZE;
    var c = document.createElement('canvas');
    c.width = c.height = S;
    var ctx = c.getContext('2d');
    var worldExtent = GALAXY_RADIUS * 1.15;
    var scale = S / (2*worldExtent);
    var cx = S/2, cy = S/2;
    function w2p(x,z){ return [cx + x*scale, cy + z*scale]; }

    // 1) base radial glow
    var grad = ctx.createRadialGradient(cx,cy,0, cx,cy, S*0.5);
    grad.addColorStop(0.00, 'rgba(255,244,214,0.88)');
    grad.addColorStop(0.06, 'rgba(255,236,205,0.82)');
    grad.addColorStop(0.16, 'rgba(255,221,190,0.74)');
    grad.addColorStop(0.30, 'rgba(224,208,205,0.58)');
    grad.addColorStop(0.46, 'rgba(178,188,214,0.42)');
    grad.addColorStop(0.65, 'rgba(120,134,171,0.24)');
    grad.addColorStop(0.85, 'rgba(60,68,96,0.10)');
    grad.addColorStop(1.00, 'rgba(20,22,35,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,S,S);

    function rand(a,b){ return a + Math.random()*(b-a); }

    function armColorAt(r){
      var coreBlend = Math.max(0, 1 - r/(GALAXY_RADIUS*0.55));
      var roll = Math.random();
      var base;
      if(roll < 0.36){
        base = mixColor(LAVENDER_HEX, ARM_WARM_HEX, Math.random()*0.4);
      } else if(roll < 0.48){
        base = mixColor(TEAL_HEX, ARM_HOT_HEX, Math.random()*0.5);
      } else {
        base = mixColor(ARM_HOT_HEX, ARM_WARM_HEX, Math.random()*0.6);
      }
      return base.lerp(new THREE.Color(CORE_COLOR_HEX), coreBlend*0.5*Math.random());
    }

    // 2) brush-stamped spiral arms (major + minor spurs)
    var armDefs = [
      {offset:0,               strength:1.0, maxR:1.02, steps:420},
      {offset:Math.PI,         strength:1.0, maxR:1.02, steps:420},
      {offset:Math.PI*0.52,    strength:0.42,maxR:0.55, steps:180},
      {offset:Math.PI*1.38,    strength:0.36,maxR:0.62, steps:190},
      {offset:Math.PI*0.18,    strength:0.24,maxR:0.40, steps:110},
      {offset:Math.PI*0.95,    strength:0.22,maxR:0.48, steps:120},
      {offset:Math.PI*1.62,    strength:0.20,maxR:0.35, steps:100},
      {offset:Math.PI*2.10,    strength:0.18,maxR:0.30, steps:90}
    ];

    ctx.globalCompositeOperation = 'lighter';
    for(var a=0; a<armDefs.length; a++){
      var arm = armDefs[a];
      for(var s=0; s<arm.steps; s++){
        var tt = s/arm.steps;
        var r = Math.pow(tt, 1.25) * GALAXY_RADIUS * arm.maxR;
        r = Math.max(r, 5);
        var theta = armAngle(r, arm.offset);
        var width = (30*Math.sin(Math.PI*Math.min(1, r/(GALAXY_RADIUS*0.92))) + 5) * (0.6+0.4*arm.strength);

        // clustered HII probability, same style as before
        var clusterN = Math.sin(theta*3.1 + r*0.09) * Math.sin(r*0.05 - theta*1.7);
        var clusterFactor = Math.max(0, clusterN);

        var stampCount = 3 + (Math.random()<0.5?1:0);
        for(var k=0;k<stampCount;k++){
          var perp = (Math.random()-0.5) * width;
          var along = (Math.random()-0.5) * (width*0.5);
          var rr = r + along*0.35;
          var t2 = theta + (perp/Math.max(rr,10));
          var x = Math.cos(t2)*rr, z = Math.sin(t2)*rr;
          var p = w2p(x,z);

          var isHii = Math.random() < (0.04 + 0.28*Math.pow(clusterFactor,3)) * arm.strength;
          var col; var alpha;
          if(isHii){
            var hiiBase2 = Math.random() < 0.72 ? HII_COLOR_HEX : EMBER_HEX;
            col = mixColor(hiiBase2, 0xffffff, Math.random()*0.25);
            alpha = rand(0.16, 0.30) * (0.6+0.4*arm.strength);
          } else {
            col = armColorAt(rr);
            alpha = rand(0.09, 0.18) * (0.6+0.4*arm.strength);
          }
          var rad = (isHii ? rand(6,13) : rand(10,26)) * (0.7+0.5*arm.strength);

          var stampGrad = ctx.createRadialGradient(p[0],p[1],0, p[0],p[1],rad);
          var rC = Math.round(col.r*255), gC = Math.round(col.g*255), bC = Math.round(col.b*255);
          stampGrad.addColorStop(0, 'rgba('+rC+','+gC+','+bC+','+alpha+')');
          stampGrad.addColorStop(1, 'rgba('+rC+','+gC+','+bC+',0)');
          ctx.fillStyle = stampGrad;
          ctx.beginPath();
          ctx.arc(p[0],p[1],rad,0,Math.PI*2);
          ctx.fill();
        }
      }
    }

    // diffuse blue haze scattered between the arms (not arm-locked),
    // for the cooler blue tone visible in the interarm gaps of the reference
    (function(){
      var hazeCount = 420;
      for(var h=0; h<hazeCount; h++){
        var rr5 = GALAXY_RADIUS * (0.18 + Math.pow(Math.random(),0.8)*0.85);
        var th5 = Math.random()*Math.PI*2;
        var x5 = Math.cos(th5)*rr5, z5 = Math.sin(th5)*rr5;
        var p5 = w2p(x5,z5);
        var col5 = mixColor(INTERARM_BLUE_HEX, 0xffffff, Math.random()*0.3);
        var rC5=Math.round(col5.r*255), gC5=Math.round(col5.g*255), bC5=Math.round(col5.b*255);
        var al5 = rand(0.02, 0.06);
        var rad5 = rand(14, 34);
        var hg = ctx.createRadialGradient(p5[0],p5[1],0, p5[0],p5[1],rad5);
        hg.addColorStop(0, 'rgba('+rC5+','+gC5+','+bC5+','+al5.toFixed(3)+')');
        hg.addColorStop(1, 'rgba('+rC5+','+gC5+','+bC5+',0)');
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.arc(p5[0],p5[1],rad5,0,Math.PI*2);
        ctx.fill();
      }
    })();

    // 3) dust lanes — multiply blend so they genuinely darken the glow beneath
    ctx.globalCompositeOperation = 'multiply';
    var dustArms = [
      {offset:0,       maxR:1.0, lead:-0.17},
      {offset:Math.PI, maxR:1.0, lead:-0.17}
    ];
    for(var d=0; d<dustArms.length; d++){
      var darm = dustArms[d];
      var chunks = 9;
      for(var ch=0; ch<chunks; ch++){
        var t0 = ch/chunks, t1 = (ch+1)/chunks;
        var r0 = Math.pow(t0,1.3)*GALAXY_RADIUS*darm.maxR + 6;
        var r1 = Math.pow(t1,1.3)*GALAXY_RADIUS*darm.maxR + 6;
        var rMid = (r0+r1)/2;
        var lw = (14*Math.sin(Math.PI*Math.min(1,rMid/(GALAXY_RADIUS*0.85)))+2);
        var al = rand(0.22,0.36) * (1.0 - Math.min(1, rMid/(GALAXY_RADIUS*1.05))*0.4);
        ctx.strokeStyle = 'rgba('+DUST_RGB+','+al.toFixed(3)+')';
        ctx.lineWidth = Math.max(2, lw);
        ctx.lineCap = 'round';
        ctx.beginPath();
        var steps2 = 10;
        for(var i2=0;i2<=steps2;i2++){
          var rt = r0 + (r1-r0)*(i2/steps2);
          var th = armAngle(rt, darm.offset) + darm.lead;
          var xx = Math.cos(th)*rt, zz = Math.sin(th)*rt;
          var pp = w2p(xx,zz);
          if(i2===0) ctx.moveTo(pp[0],pp[1]); else ctx.lineTo(pp[0],pp[1]);
        }
        ctx.stroke();
      }
    }

    // single dust lane sweeping across the bar / core, gently curved
    // (not a symmetric X — the reference has one soft sweep, not two)
    (function(){
      var ang = 0.5, curve = 0.22;
      var len = 60;
      var widths = [32, 24, 17, 10, 5];
      var alphas = [0.09, 0.13, 0.18, 0.24, 0.30];
      for(var wI=0; wI<widths.length; wI++){
        ctx.strokeStyle = 'rgba('+DUST_RGB+','+alphas[wI]+')';
        ctx.lineWidth = widths[wI];
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        var steps3 = 14;
        for(var i3=0;i3<=steps3;i3++){
          var tt3 = i3/steps3 - 0.5;
          var dd = tt3*len;
          var bend = curve * Math.sin(tt3*Math.PI) * len * 0.18;
          var x = dd*Math.cos(ang) - bend*Math.sin(ang);
          var z = dd*Math.sin(ang) + bend*Math.cos(ang);
          var pp = w2p(x,z);
          if(i3===0) ctx.moveTo(pp[0],pp[1]); else ctx.lineTo(pp[0],pp[1]);
        }
        ctx.stroke();
      }
    })();

    // fine stippled dust grain near the core — the messy brown/gray
    // filament texture visible close to the bulge in the reference photos
    ctx.globalCompositeOperation = 'multiply';
    (function(){
      var speckCount = 4200;
      for(var i4=0;i4<speckCount;i4++){
        var rr4 = Math.pow(Math.random(), 1.5) * GALAXY_RADIUS * 0.98;
        rr4 = Math.max(rr4, 4);
        var th4 = Math.random()*Math.PI*2;
        var wob = (Math.random()-0.5) * (8 + rr4*0.25);
        var x4 = Math.cos(th4)*rr4 + wob;
        var z4 = Math.sin(th4)*rr4 + wob*0.6;
        var p4 = w2p(x4,z4);
        var isGray = Math.random() < 0.4;
        var rgbStr = isGray ? '143,128,116' : '74,52,38';
        var al4 = rand(0.04, 0.14) * (1 - rr4/(GALAXY_RADIUS*1.05));
        var rad4 = rand(3, 10);
        var sg = ctx.createRadialGradient(p4[0],p4[1],0, p4[0],p4[1],rad4);
        sg.addColorStop(0, 'rgba('+rgbStr+','+al4.toFixed(3)+')');
        sg.addColorStop(1, 'rgba('+rgbStr+',0)');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.arc(p4[0],p4[1],rad4,0,Math.PI*2);
        ctx.fill();
      }
    })();

    ctx.globalCompositeOperation = 'source-over';

    var tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy ? renderer.capabilities.getMaxAnisotropy() : 1;
    return {texture: tex, worldExtent: worldExtent};
  }

  // ---------- Build scene ----------
  var galaxyGroup = new THREE.Group();
  scene.add(galaxyGroup);

  var texResult = buildGalaxyTexture();
  var discGeo = new THREE.PlaneGeometry(texResult.worldExtent*2, texResult.worldExtent*2);
  var discMat = new THREE.MeshBasicMaterial({
    map: texResult.texture, transparent:true, depthWrite:false,
    blending: THREE.NormalBlending, side: THREE.DoubleSide
  });
  var discMesh = new THREE.Mesh(discGeo, discMat);
  discMesh.rotation.x = -Math.PI/2;
  discMesh.renderOrder = -10;
  galaxyGroup.add(discMesh);

  // bright core glow, layered above the disc as several nested sprites
  // for a richer, near-overexposed bulge like the reference image
  (function(){
    var layers = [
      {color:0xfff6e2, scale:15, opacity:0.75},
      {color:0xffe9c2, scale:30, opacity:0.55},
      {color:0xffd9a0, scale:56, opacity:0.32}
    ];
    for(var i=0;i<layers.length;i++){
      var L = layers[i];
      var glowMat = new THREE.SpriteMaterial({
        map: spriteTex, color: L.color, transparent:true,
        blending: THREE.AdditiveBlending, depthWrite:false, opacity:L.opacity
      });
      var glow = new THREE.Sprite(glowMat);
      glow.scale.set(L.scale, L.scale, 1);
      glow.renderOrder = -5;
      galaxyGroup.add(glow);
    }
  })();

  // small bright satellite clump off the disc plane, echoing the
  // little glowing knot visible upper-left in the reference image
  function buildSatelliteClump(){
    var pos = new THREE.Vector3(-118, 26, -96);
    var glowMat = new THREE.SpriteMaterial({
      map: spriteTex, color: 0xf3f6ff, transparent:true,
      blending: THREE.AdditiveBlending, depthWrite:false, opacity:0.95
    });
    var glow = new THREE.Sprite(glowMat);
    glow.position.copy(pos);
    glow.scale.set(9,9,1);
    glow.renderOrder = -3;
    galaxyGroup.add(glow);

    var n = 140;
    var positions = new Float32Array(n*3);
    var colors = new Float32Array(n*3);
    var sizes = new Float32Array(n);
    var phases = new Float32Array(n);
    var alphas = new Float32Array(n);
    for(var i=0;i<n;i++){
      var rad = Math.pow(Math.random(),1.6) * 14;
      var phi = Math.random()*Math.PI*2, ct = Math.random()*2-1, th = Math.acos(ct);
      var x = pos.x + rad*Math.sin(th)*Math.cos(phi);
      var y = pos.y + rad*Math.cos(th)*0.6;
      var z = pos.z + rad*Math.sin(th)*Math.sin(phi);
      positions[i*3+0]=x; positions[i*3+1]=y; positions[i*3+2]=z;
      var isPink = Math.random() < 0.06;
      var col = isPink ? mixColor(HII_COLOR_HEX,0xffffff,Math.random()*0.3) : mixColor(0xffffff,0xbcd8ff,Math.random()*0.5);
      colors[i*3+0]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
      sizes[i]=0.5+Math.random()*1.3; phases[i]=Math.random()*Math.PI*2; alphas[i]=0.7+Math.random()*0.3;
    }
    var geo = makeAttrGeometry(positions, colors, sizes, phases, alphas);
    var mat = makeMaterial(spriteTex, THREE.AdditiveBlending, 0.3);
    var pts = new THREE.Points(geo, mat);
    galaxyGroup.add(pts);
    return {points:pts, material:mat};
  }

  function buildDustGrain(){
    var count = 24000;
    var positions = new Float32Array(count*3);
    var colors = new Float32Array(count*3);
    var sizes = new Float32Array(count);
    var phases = new Float32Array(count);
    var alphas = new Float32Array(count);
    for(var i=0;i<count;i++){
      var r = Math.pow(Math.random(),1.5) * GALAXY_RADIUS * 0.96;
      r = Math.max(r, 3);
      var theta = armAngle(r, (i%2)*Math.PI) + (Math.random()-0.5)*(0.35+r*0.012);
      var rr = r + (Math.random()-0.5)*(8+r*0.15);
      var x = Math.cos(theta)*rr, z = Math.sin(theta)*rr;
      var y = (Math.random()-0.5)*1.6;
      positions[i*3+0]=x; positions[i*3+1]=y; positions[i*3+2]=z;
      var isGray = Math.random()<0.4;
      var col = isGray ? mixColor(DUST_GRAY_HEX,0x6a6058,Math.random()) : mixColor(DUST_BROWN_HEX,0x3a281c,Math.random());
      colors[i*3+0]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
      sizes[i]=1.2+Math.random()*2.6; phases[i]=Math.random()*Math.PI*2;
      alphas[i]=(0.16+Math.random()*0.20) * (1 - 0.35*(r/GALAXY_RADIUS));
    }
    var geo = makeAttrGeometry(positions, colors, sizes, phases, alphas);
    var mat = makeMaterial(spriteTex, THREE.NormalBlending, 0.0);
    var pts = new THREE.Points(geo, mat);
    pts.renderOrder = -4;
    galaxyGroup.add(pts);
    return {points:pts, material:mat};
  }

  function buildInterarmHaze(){
    var count = 18000;
    var positions = new Float32Array(count*3);
    var colors = new Float32Array(count*3);
    var sizes = new Float32Array(count);
    var phases = new Float32Array(count);
    var alphas = new Float32Array(count);
    for(var i=0;i<count;i++){
      var u = Math.random();
      var r = GALAXY_RADIUS * (0.15 + Math.pow(u,0.85)*0.9);
      var theta = Math.random()*Math.PI*2;
      var x = Math.cos(theta)*r, z = Math.sin(theta)*r;
      var diskThickness = 3.0 + (r/GALAXY_RADIUS)*4.0;
      var y = (Math.random()-0.5) * diskThickness;
      positions[i*3+0]=x; positions[i*3+1]=y; positions[i*3+2]=z;
      var col = mixColor(INTERARM_BLUE_HEX, 0xffffff, Math.random()*0.35);
      colors[i*3+0]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
      sizes[i]=0.4+Math.random()*1.0; phases[i]=Math.random()*Math.PI*2; alphas[i]=0.25+Math.random()*0.3;
    }
    var geo = makeAttrGeometry(positions, colors, sizes, phases, alphas);
    var mat = makeMaterial(spriteTex, THREE.AdditiveBlending, 0.4);
    var pts = new THREE.Points(geo, mat);
    galaxyGroup.add(pts);
    return {points:pts, material:mat};
  }

  // ---------- Sparkle point layers on top of the painted disc ----------
  function buildArmStars(){
    var count = TOTAL_ARM_STARS;
    var positions = new Float32Array(count*3);
    var colors = new Float32Array(count*3);
    var sizes = new Float32Array(count);
    var phases = new Float32Array(count);
    var alphas = new Float32Array(count);

    for(var i=0;i<count;i++){
      var arm = i % NUM_ARMS;
      var armOffset = arm * Math.PI;
      var u = Math.random();
      var r = GALAXY_RADIUS * Math.pow(u, 1.7);
      r = Math.max(r, 6);

      var theta = armAngle(r, armOffset);
      var scatter = 0.5 * (0.35 + r/GALAXY_RADIUS) * (0.6 + Math.random()*0.8);
      var angJitter = (Math.random()-0.5) * scatter;
      var radialJitter = (Math.random()-0.5) * (10 + r*0.07);

      var rr = Math.max(r + radialJitter, 4);
      var t = theta + angJitter;

      var x = Math.cos(t) * rr;
      var z = Math.sin(t) * rr;
      var diskThickness = 2.0 + 5.0 * Math.exp(-rr/40) + (rr/GALAXY_RADIUS)*3.0;
      var y = (Math.random()-0.5) * diskThickness * (Math.random()<0.5?1:0.4);

      positions[i*3+0]=x; positions[i*3+1]=y; positions[i*3+2]=z;

      var clusterN = Math.sin(t*3.1 + rr*0.09) * Math.sin(rr*0.05 - t*1.7);
      var clusterFactor = Math.max(0, clusterN);
      var hiiChance = 0.02 + 0.11*Math.pow(clusterFactor,3.0);
      var rand2 = Math.random();
      var col; var size;
      if(rand2 < hiiChance){
        var hiiRoll = Math.random();
        var hiiBase = hiiRoll < 0.72 ? HII_COLOR_HEX : EMBER_HEX;
        col = mixColor(hiiBase, 0xffffff, Math.random()*0.3);
        size = rand2Range(1.4, 2.6);
      } else {
        var coreBlend = Math.max(0, 1 - rr/(GALAXY_RADIUS*0.55));
        var roll2 = Math.random();
        var base;
        if(roll2 < 0.34){
          base = mixColor(LAVENDER_HEX, ARM_WARM_HEX, Math.random()*0.4);
        } else if(roll2 < 0.48){
          base = mixColor(TEAL_HEX, ARM_HOT_HEX, Math.random()*0.5);
        } else {
          base = mixColor(ARM_HOT_HEX, ARM_WARM_HEX, Math.random()*0.6);
        }
        col = base.lerp(new THREE.Color(CORE_COLOR_HEX), coreBlend*0.5*Math.random());
        size = rand2Range(0.5, 1.6);
      }
      colors[i*3+0]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
      sizes[i]=size; phases[i]=Math.random()*Math.PI*2; alphas[i]=0.75+Math.random()*0.25;
    }
    function rand2Range(a,b){ return a+Math.random()*(b-a); }

    var geo = makeAttrGeometry(positions, colors, sizes, phases, alphas);
    var mat = makeMaterial(spriteTex, THREE.AdditiveBlending, 0.35);
    var pts = new THREE.Points(geo, mat);
    galaxyGroup.add(pts);
    return {points: pts, material: mat};
  }

  function buildBulge(){
    var count = BULGE_STARS;
    var positions = new Float32Array(count*3);
    var colors = new Float32Array(count*3);
    var sizes = new Float32Array(count);
    var phases = new Float32Array(count);
    var alphas = new Float32Array(count);
    var barLen=55, barWidth=22, barHeight=20;
    for(var i=0;i<count;i++){
      var g1=(Math.random()+Math.random()+Math.random()-1.5)/1.5;
      var g2=(Math.random()+Math.random()+Math.random()-1.5)/1.5;
      var g3=(Math.random()+Math.random()+Math.random()-1.5)/1.5;
      var x=g1*barLen, y=g3*barHeight*0.5, z=g2*barWidth;
      var ang=0.5;
      var xr=x*Math.cos(ang)-z*Math.sin(ang), zr=x*Math.sin(ang)+z*Math.cos(ang);
      positions[i*3+0]=xr; positions[i*3+1]=y; positions[i*3+2]=zr;
      var dist=Math.sqrt(x*x+y*y+z*z);
      var col=mixColor(0xfff2d0, CORE_COLOR_HEX, Math.min(1,dist/40));
      colors[i*3+0]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
      sizes[i]=Math.random()*1.0+0.5; phases[i]=Math.random()*Math.PI*2; alphas[i]=0.9;
    }
    var geo = makeAttrGeometry(positions, colors, sizes, phases, alphas);
    var mat = makeMaterial(spriteTex, THREE.AdditiveBlending, 0.15);
    var pts = new THREE.Points(geo, mat);
    galaxyGroup.add(pts);
    return {points: pts, material: mat};
  }

  function buildHalo(){
    var count = HALO_STARS;
    var positions = new Float32Array(count*3);
    var colors = new Float32Array(count*3);
    var sizes = new Float32Array(count);
    var phases = new Float32Array(count);
    var alphas = new Float32Array(count);
    for(var i=0;i<count;i++){
      var r=GALAXY_RADIUS*(0.3+Math.random()*1.4);
      var phi=Math.random()*Math.PI*2, costheta=Math.random()*2-1, theta=Math.acos(costheta);
      var x=r*Math.sin(theta)*Math.cos(phi), y=r*Math.cos(theta)*0.6, z=r*Math.sin(theta)*Math.sin(phi);
      positions[i*3+0]=x; positions[i*3+1]=y; positions[i*3+2]=z;
      var col=mixColor(0xcfd6e8,0x8f97ad,Math.random());
      colors[i*3+0]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
      sizes[i]=Math.random()*0.8+0.25; phases[i]=Math.random()*Math.PI*2; alphas[i]=0.8;
    }
    var geo = makeAttrGeometry(positions, colors, sizes, phases, alphas);
    var mat = makeMaterial(spriteTex, THREE.AdditiveBlending, 0.3);
    var pts = new THREE.Points(geo, mat);
    galaxyGroup.add(pts);
    return {points: pts, material: mat};
  }

  function buildBackground(){
    var count = BG_STARS;
    var positions = new Float32Array(count*3);
    var colors = new Float32Array(count*3);
    var sizes = new Float32Array(count);
    var phases = new Float32Array(count);
    var alphas = new Float32Array(count);
    for(var i=0;i<count;i++){
      var r=900+Math.random()*1400;
      var phi=Math.random()*Math.PI*2, costheta=Math.random()*2-1, theta=Math.acos(costheta);
      positions[i*3+0]=r*Math.sin(theta)*Math.cos(phi);
      positions[i*3+1]=r*Math.cos(theta);
      positions[i*3+2]=r*Math.sin(theta)*Math.sin(phi);
      var t=Math.random();
      var col=mixColor(0xffffff,0xaebfff,t*0.5);
      colors[i*3+0]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
      sizes[i]=Math.random()*1.0+0.2; phases[i]=Math.random()*Math.PI*2; alphas[i]=0.9;
    }
    var geo = makeAttrGeometry(positions, colors, sizes, phases, alphas);
    var mat = makeMaterial(spriteTex, THREE.AdditiveBlending, 0.5);
    var pts = new THREE.Points(geo, mat);
    scene.add(pts);
    return {points: pts, material: mat};
  }

  var armLayer = buildArmStars();
  var bulgeLayer = buildBulge();
  var haloLayer = buildHalo();
  var bgLayer = buildBackground();
  var satLayer = buildSatelliteClump();
  var dustLayer = buildDustGrain();
  var hazeLayer = buildInterarmHaze();
  var allLayers = [armLayer, bulgeLayer, haloLayer, bgLayer, satLayer, dustLayer, hazeLayer];

  // ============================================================
  // Lightweight, thresholded bloom: only pixels above a brightness
  // cutoff (the core, hot young stars, HII knots) contribute glow —
  // the mid-tone disc itself is left alone so color/contrast survive.
  // Runs on a downsampled (1/9th pixel count) target, so the cost
  // is negligible on any GPU from the last decade.
  // ============================================================
  var bloomStrength = 0.6;
  var bloomThreshold = 0.68;
  var rtParams = { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat };
  var bloomRT, blurRT1, blurRT2;

  function makeRenderTargets(w,h){
    var bw = Math.max(1, Math.floor(w/BLOOM_DOWNSAMPLE));
    var bh = Math.max(1, Math.floor(h/BLOOM_DOWNSAMPLE));
    if(bloomRT) bloomRT.dispose();
    if(blurRT1) blurRT1.dispose();
    if(blurRT2) blurRT2.dispose();
    bloomRT = new THREE.WebGLRenderTarget(bw,bh,rtParams);
    blurRT1 = new THREE.WebGLRenderTarget(bw,bh,rtParams);
    blurRT2 = new THREE.WebGLRenderTarget(bw,bh,rtParams);
  }

  var postScene = new THREE.Scene();
  var postCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  var quadGeo = new THREE.PlaneGeometry(2,2);
  var quadVert = [
    "varying vec2 vUv;",
    "void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }"
  ].join("\n");

  var thresholdMat = new THREE.ShaderMaterial({
    uniforms: { uTex:{value:null}, uThreshold:{value:bloomThreshold} },
    vertexShader: quadVert,
    fragmentShader: [
      "precision mediump float;",
      "uniform sampler2D uTex; uniform float uThreshold; varying vec2 vUv;",
      "void main(){",
      "  vec4 c = texture2D(uTex, vUv);",
      "  float lum = dot(c.rgb, vec3(0.2126,0.7152,0.0722));",
      "  float f = smoothstep(uThreshold-0.16, uThreshold+0.16, lum);",
      "  gl_FragColor = vec4(c.rgb*f, c.a*f);",
      "}"
    ].join("\n"),
    depthTest:false, depthWrite:false
  });

  function makeBlurMat(){
    return new THREE.ShaderMaterial({
      uniforms: { uTex:{value:null}, uDir:{value:new THREE.Vector2(1,0)} },
      vertexShader: quadVert,
      fragmentShader: [
        "precision mediump float;",
        "uniform sampler2D uTex; uniform vec2 uDir; varying vec2 vUv;",
        "void main(){",
        "  vec4 sum = vec4(0.0);",
        "  sum += texture2D(uTex, vUv - 4.0*uDir) * 0.05;",
        "  sum += texture2D(uTex, vUv - 3.0*uDir) * 0.09;",
        "  sum += texture2D(uTex, vUv - 2.0*uDir) * 0.12;",
        "  sum += texture2D(uTex, vUv - 1.0*uDir) * 0.15;",
        "  sum += texture2D(uTex, vUv)             * 0.18;",
        "  sum += texture2D(uTex, vUv + 1.0*uDir) * 0.15;",
        "  sum += texture2D(uTex, vUv + 2.0*uDir) * 0.12;",
        "  sum += texture2D(uTex, vUv + 3.0*uDir) * 0.09;",
        "  sum += texture2D(uTex, vUv + 4.0*uDir) * 0.05;",
        "  gl_FragColor = sum;",
        "}"
      ].join("\n"),
      depthTest:false, depthWrite:false
    });
  }
  var blurMatH = makeBlurMat();
  var blurMatV = makeBlurMat();
  var compMat = new THREE.ShaderMaterial({
    uniforms: { uTex:{value:null}, uStrength:{value:bloomStrength} },
    vertexShader: quadVert,
    fragmentShader: [
      "precision mediump float;",
      "uniform sampler2D uTex; uniform float uStrength; varying vec2 vUv;",
      "void main(){",
      "  vec4 c = texture2D(uTex, vUv);",
      "  gl_FragColor = vec4(c.rgb*uStrength, c.a*uStrength);",
      "}"
    ].join("\n"),
    transparent:true, blending:THREE.AdditiveBlending, depthTest:false, depthWrite:false
  });

  var quadMesh = new THREE.Mesh(quadGeo, thresholdMat);
  postScene.add(quadMesh);

  function renderBloom(){
    var bw = bloomRT.width, bh = bloomRT.height;

    renderer.setRenderTarget(bloomRT);
    renderer.clear();
    renderer.render(scene, camera);

    quadMesh.material = thresholdMat;
    thresholdMat.uniforms.uTex.value = bloomRT.texture;
    renderer.setRenderTarget(blurRT1);
    renderer.clear();
    renderer.render(postScene, postCamera);

    quadMesh.material = blurMatH;
    blurMatH.uniforms.uTex.value = blurRT1.texture;
    blurMatH.uniforms.uDir.value.set(1/bw, 0);
    renderer.setRenderTarget(blurRT2);
    renderer.clear();
    renderer.render(postScene, postCamera);

    quadMesh.material = blurMatV;
    blurMatV.uniforms.uTex.value = blurRT2.texture;
    blurMatV.uniforms.uDir.value.set(0, 1/bh);
    renderer.setRenderTarget(blurRT1);
    renderer.clear();
    renderer.render(postScene, postCamera);

    quadMesh.material = compMat;
    compMat.uniforms.uTex.value = blurRT1.texture;
    renderer.setRenderTarget(null);
    renderer.autoClear = false;
    renderer.render(postScene, postCamera);
    renderer.autoClear = true;
  }

  // ---------- Camera orbit controls ----------
  var target = new THREE.Vector3(0,0,0);
  var radius = 300, minRadius = 60, maxRadius = 900;
  var azimuth = 0.7;
  var polar = 0.46;
  var minPolar = 0.12, maxPolar = Math.PI - 0.12;

  var isPointerDown = false;
  var lastX=0, lastY=0;
  var autoRotate = true;
  var idleTimer = null;
  var hintEl = document.getElementById('hint');

  function updateCamera(){
    var x = target.x + radius*Math.sin(polar)*Math.sin(azimuth);
    var y = target.y + radius*Math.cos(polar);
    var z = target.z + radius*Math.sin(polar)*Math.cos(azimuth);
    camera.position.set(x,y,z);
    camera.lookAt(target);
    var camInfoEl = document.getElementById('camInfo');
    if(camInfoEl) camInfoEl.textContent = 'r ' + radius.toFixed(0) + ' ly·k';
  }

  function onPointerDown(e){
    isPointerDown = true; autoRotate = false;
    lastX = e.clientX!==undefined ? e.clientX : e.touches[0].clientX;
    lastY = e.clientY!==undefined ? e.clientY : e.touches[0].clientY;
    hintEl.classList.remove('show');
    clearTimeout(idleTimer);
  }
  function onPointerMove(e){
    if(!isPointerDown) return;
    var x = e.clientX!==undefined ? e.clientX : e.touches[0].clientX;
    var y = e.clientY!==undefined ? e.clientY : e.touches[0].clientY;
    var dx=x-lastX, dy=y-lastY; lastX=x; lastY=y;
    azimuth -= dx*0.0045;
    polar -= dy*0.0035;
    polar = Math.max(minPolar, Math.min(maxPolar, polar));
  }
  function onPointerUp(){
    isPointerDown = false;
    idleTimer = setTimeout(function(){ autoRotate = true; }, 2600);
  }
  function onWheel(e){
    e.preventDefault();
    radius += e.deltaY*0.35;
    radius = Math.max(minRadius, Math.min(maxRadius, radius));
  }

  canvas.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', function(e){ onPointerDown(e); }, {passive:true});
  window.addEventListener('touchmove', function(e){ onPointerMove(e); }, {passive:true});
  window.addEventListener('touchend', onPointerUp);
  canvas.addEventListener('wheel', onWheel, {passive:false});

  setTimeout(function(){ hintEl.classList.add('show'); }, 900);

  function resize(){
    var w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w,h,false);
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    makeRenderTargets(w,h);
  }
  window.addEventListener('resize', resize);
  resize();

  var clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();
    if(autoRotate) azimuth += 0.0009;
    updateCamera();
    galaxyGroup.rotation.y += 0.00012;
    for(var i=0;i<allLayers.length;i++){ allLayers[i].material.uniforms.uTime.value = t; }

    renderer.setRenderTarget(null);
    renderer.autoClear = true;
    renderer.render(scene, camera);
    renderBloom();
  }
  updateCamera();
  animate();

  var loadingEl = document.getElementById('loading');
  requestAnimationFrame(function(){
    setTimeout(function(){
      loadingEl.style.opacity = '0';
      setTimeout(function(){ loadingEl.style.display='none'; }, 650);
    }, 80);
  });

})();
</script>
</body>
</html>
